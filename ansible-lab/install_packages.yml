- name: Install required packages for lab
  hosts: appservers
  become: true

  vars:
    common_packages:
      - redis-server
      - postgresql
      - postgresql-contrib
      - python3
      - python3-pip
      - python3-venv
      - git
      - curl
      - wget
      - unzip

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
