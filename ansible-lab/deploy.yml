- hosts: appservers
  become: true
  vars:
    app_dir: /opt/myapp
    venv_dir: /opt/myapp/.venv
    service_name: myapp
    app_user: appuser
    app_group: appuser
    repo_url: "https://github.com/geniusatthemoment/api_notes.git"
    app_version: "main"
    python_bin: python3
    log_dir: /var/log/myapp

  tasks:
    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
      tags:
        - update
        - start

    - name: Stop application
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: stopped
      tags:
        - stop

    - name: Update application source code
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ app_version }}"
        force: true
      become_user: "{{ app_user }}"
      tags:
        - update

    - name: Create virtual environment
      ansible.builtin.command: "{{ python_bin }} -m venv {{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"
      tags:
        - update

    - name: Install python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: "{{ python_bin }}"
      become_user: "{{ app_user }}"
      tags:
        - update

    - name: Restart application after update
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
        daemon_reload: true
      tags:
        - update

    - name: Start application
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: started
        enabled: true
        daemon_reload: true
      tags:
        - start

    - name: Restart application
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
        daemon_reload: true
      tags:
        - restart
